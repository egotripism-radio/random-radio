<title>Random Radio v78</title>
<style>
:root{--bg:#050505;--text:#f5f0ea;--muted:#938c84;--red:#e1192d;--green:#36ff8b}
*{box-sizing:border-box}html,body{height:100%;margin:0}
body{background:radial-gradient(circle at 50% 42%,#171012 0,#070707 45%,#020202 100%);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;overflow:hidden}
body:before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 50% 50%,rgba(225,25,45,.14),transparent 30%),linear-gradient(180deg,rgba(255,255,255,.035),transparent 32%,rgba(0,0,0,.25));pointer-events:none}
.app{position:relative;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:22px 16px calc(20px + env(safe-area-inset-bottom))}
.shell{position:relative;width:min(430px,100%);min-height:min(850px,calc(100dvh - 24px));border:1px solid rgba(255,255,255,.09);border-radius:38px;background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.022));box-shadow:0 36px 100px rgba(0,0,0,.68),inset 0 1px 0 rgba(255,255,255,.08);display:flex;flex-direction:column;align-items:center;padding:32px 20px 22px;overflow:hidden;backdrop-filter:blur(16px)}
header{text-align:center;z-index:2}.brand{font-size:40px;line-height:.96;font-weight:780;letter-spacing:-.065em;cursor:default}.brand .r{color:var(--red);text-shadow:0 0 22px rgba(225,25,45,.75)}.tag{margin-top:12px;color:var(--muted);font-size:13px;letter-spacing:.015em}
.tag b{color:#c9c2ba;font-weight:600}
/* 여행 스탯 줄: 계기판 숫자처럼 — 고정폭 숫자, 넓은 자간, 낮은 명도 */
.stats{margin-top:7px;display:flex;gap:9px;justify-content:center;align-items:center;color:#8a837b;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;font-variant-numeric:tabular-nums}
.stats i{font-style:normal;color:#4e4a45}
.globeArea{position:relative;z-index:2;width:min(92vw,382px);aspect-ratio:1;margin:24px 0 10px;display:grid;place-items:center}
#globeBtn{position:absolute;inset:0;border:0;padding:0;background:transparent;border-radius:50%;cursor:pointer;touch-action:manipulation;z-index:6}#globeBtn:active{transform:scale(.985)}
canvas{width:100%;height:100%;display:block;border-radius:50%;filter:drop-shadow(0 0 30px rgba(225,25,45,.18)) drop-shadow(0 26px 45px rgba(0,0,0,.7))}
.orbit{position:absolute;inset:7%;border:1px solid rgba(225,25,45,.23);border-radius:50%;transform:rotateX(62deg) rotateZ(-18deg);box-shadow:0 0 34px rgba(225,25,45,.12);pointer-events:none}
.wave{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(54,255,139,.55);opacity:0;pointer-events:none;z-index:3}.traveling .wave{animation:ripple 1.18s ease-out infinite}.traveling .wave.w2{animation-delay:.38s}.traveling .wave.w3{animation-delay:.76s}
@keyframes ripple{0%{transform:scale(.985);opacity:.62;border-color:rgba(54,255,139,.72)}66%{opacity:.16}100%{transform:scale(1.18);opacity:0;border-color:rgba(54,255,139,0)}}.traveling canvas{filter:drop-shadow(0 0 50px rgba(54,255,139,.32)) drop-shadow(0 26px 45px rgba(0,0,0,.7))}
.traveling @media(prefers-reduced-motion:reduce){.traveling .wave,.tap .finger{animation:none}}
.globeArea.started .tap{display:none}
.tap{position:absolute;left:50%;bottom:7.5%;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;gap:5px;padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.16);box-shadow:0 10px 28px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.08);color:#fff2e8;pointer-events:none;backdrop-filter:blur(10px);z-index:7}
.tap .finger{font-size:16px;line-height:1;filter:drop-shadow(0 0 8px rgba(255,255,255,.22));animation:fingerTap 1.8s ease-in-out infinite}
.tap .tapText{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,242,232,.86);font-weight:680}
@keyframes fingerTap{0%,100%{transform:translateY(0) scale(1);opacity:.86}42%{transform:translateY(-2px) scale(1.05);opacity:1}58%{transform:translateY(1px) scale(.96);opacity:.92}}
.info{z-index:3;width:min(360px,100%);margin-top:auto;padding:8px 16px 0;text-align:center;position:relative;display:flex;flex-direction:column;align-items:center}.country{color:var(--green);font-size:13px;letter-spacing:.18em;text-transform:uppercase;text-shadow:0 0 18px rgba(54,255,139,.45);min-height:18px;text-align:center;margin:0 auto 4px;font-weight:650}.station{margin:0 auto;font-size:14px;font-weight:520;letter-spacing:-.005em;line-height:1.18;min-height:36px;text-align:center;display:flex;align-items:flex-start;justify-content:center;max-width:280px;text-wrap:balance;color:#fff7ee}
.genre{margin:2px auto 0;color:var(--muted);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;min-height:13px}
/* 주파수 신호계: 중앙이 높고 가장자리로 잦아드는 대칭 엔벨로프,
   양끝은 안개처럼 사라진다(마스크). transform 기반이라 부드럽고 저전력 */
.statusWave{display:none;height:22px;align-items:center;justify-content:center;gap:3.5px;margin-top:-3px;margin-bottom:10px;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 20%,#000 80%,transparent);
  mask-image:linear-gradient(90deg,transparent,#000 20%,#000 80%,transparent)}
.travelingState .statusWave{display:flex}
.statusWave i{display:block;width:2px;height:calc(22px*var(--h,1));border-radius:99px;
  background:linear-gradient(180deg,#8affc2,rgba(54,255,139,.22));
  box-shadow:0 0 7px rgba(54,255,139,.45);
  transform:scaleY(.3);transform-origin:center;
  animation:bar 940ms cubic-bezier(.45,0,.55,1) infinite;animation-delay:var(--d,0ms)}
@keyframes bar{0%,100%{transform:scaleY(.26);opacity:.5}50%{transform:scaleY(1);opacity:1}}
.favRow{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px}.fav{width:40px;height:40px;display:grid;place-items:center;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--text);font-size:18px;cursor:pointer;backdrop-filter:blur(12px);flex:none}.fav.on{color:var(--red);border-color:rgba(225,25,45,.42);background:rgba(225,25,45,.11);box-shadow:0 0 20px rgba(225,25,45,.18)}
.fav.sleepOn{color:var(--green);border-color:rgba(54,255,139,.4);background:rgba(54,255,139,.08);box-shadow:0 0 20px rgba(54,255,139,.16)}
.sleepInfo{min-height:13px;margin-top:6px;color:var(--red);font-size:10px;letter-spacing:.13em;text-transform:uppercase;font-variant-numeric:tabular-nums;text-shadow:0 0 10px rgba(225,25,45,.4)}
.drawer{position:absolute;left:18px;right:18px;bottom:18px;z-index:10;border-radius:26px;background:rgba(9,9,9,.82);border:1px solid rgba(255,255,255,.1);box-shadow:0 -18px 70px rgba(0,0,0,.58),inset 0 1px 0 rgba(255,255,255,.06);backdrop-filter:blur(20px);transform:translateY(calc(100% + 24px));transition:transform .32s ease;max-height:44%;display:flex;flex-direction:column;overflow:hidden}.drawer.open{transform:translateY(0)}
.drawerHead{position:relative;display:flex;align-items:center;justify-content:flex-end;padding:10px 8px 2px;touch-action:none}
.grip{position:absolute;left:50%;top:7px;transform:translateX(-50%);width:36px;height:4px;border-radius:99px;background:rgba(255,255,255,.22)}.close{width:24px;height:24px;border-radius:50%;border:1px solid rgba(225,25,45,.46);background:rgba(225,25,45,.18);color:#ff6b72;font-size:15px;line-height:1;cursor:pointer;padding:0;display:grid;place-items:center;box-shadow:0 0 16px rgba(225,25,45,.18)}.favList{overflow:auto;padding:0 7px 8px}.empty{padding:18px 10px 24px;color:#817a73;font-size:11px;text-align:center}
.favItem{width:100%;display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center;padding:7px 6px;border:0;border-top:1px solid rgba(255,255,255,.055);background:transparent;color:var(--text);text-align:left;cursor:pointer}
.favItem .meta{display:block;font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--green);opacity:.86}.favItem .name{display:block;font-size:11.5px;line-height:1.12;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.remove{width:19px;height:19px;border-radius:50%;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);color:#7e7770;cursor:pointer;font-size:11px}
.notice{margin-top:8px;color:#5d5852;font-size:9.5px;line-height:1.25;max-width:300px;text-align:center}

const BIGR={RU:55,US:56,CA:42,CN:32,BR:30,AU:32,KZ:26,IN:24,AR:26,ID:34,GL:32,MX:24,CL:24,NO:26,FR:24,SA:24,DZ:24,LY:24,SD:24,MN:24,ZA:24,IR:24,EG:22,PE:22,CO:22};
const R_DEFAULT=20;
/* 국가명 표기 예외(그 외에는 Intl.DisplayNames로 자동 변환) */
const DISPLAY={US:'AMERICA',GB:'UK',KR:'KOREA',KP:'NORTH KOREA',AE:'UAE',CD:'DR CONGO'};
const REGION=(()=>{try{return new Intl.DisplayNames(['en'],{type:'region'})}catch{return null}})();

/* 음악 외 콘텐츠 차단 필터 — 태그와 방송국 이름 양쪽에 적용 */
const BAD=/news|talk|speech|sport|relig|scanner|weather|police|podcast|traffic|sermon|quran|preach/i;
const IS_IOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
const POOL_TARGET=2000,POOL_MAX=5000;
const CACHE_KEY='rr_pool_v62',CACHE_TTL=24*60*60*1000;  /* 채널 풀 캐시(24시간, 백그라운드 갱신 병행) */
const BAD_KEY='rr_bad_v62';                             /* 죽은 스트림 블랙리스트(세션 간 유지) */
const FAV_KEY='rr_favs_v50';                            /* 즐겨찾기 */
const LAST_KEY='rr_last_v60';                           /* 마지막 청취 상태 */

/* ───────────────────────── 1. 상태 ───────────────────────── */

const $=id=>document.getElementById(id),canvas=$('globe'),ctx=canvas.getContext('2d');
/* 지구본 렌더링 상태 */
let width=0,height=0,projection=null,path=null,graticule=null,land=null,rotation=[-15,-10,0],targetRotation=null,dots=[];
/* 채널·재생 상태 */
let pool=new Map(),current=null,started=false,switching=false,autoRetries=0;
let bad=new Map(),played=new Set(),recentCountries=[],lastClickBase=API[0];
/* 사용자 데이터 */
let favs=[],drawer=false,resumeStation=null,savedVolume=1;
/* 와치독(재생 중 감시) 상태 */
let userPaused=false,reconnects=0,stallStrikes=0,lastMediaTime=-1,watchTimer=null,reconnecting=false,waitTimer=null,waitT=0;
/* 디버그 오버레이 */
const DLOG=[];let debugOpen=false;
function dlog(m){
  const t=new Date(),ts=[t.getHours(),t.getMinutes(),t.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
  DLOG.push(ts+' '+m);
  if(DLOG.length>80)DLOG.shift();
  if(debugOpen)renderDebug();
}

/* ───────────────────────── 2. 유틸 ───────────────────────── */

const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
/* HTTPS 직결 스트림만 통과. 플레이리스트(.pls/.m3u/.m3u8 등)는
   <audio>가 직접 재생 못 하므로 배제 */
function stream(st){const u=String(st.url_resolved||st.url||'').trim();if(!/^https:\/\//i.test(u))return'';if(/\.(pls|asx|xspf|m3u)($|\?)/i.test(u))return'';return u}
/* HLS(.m3u8) 여부 — v64부터 지원: Safari 계열은 네이티브, 그 외는 hls.js */
function isHls(st){return Number(st&&st.hls)===1||/\.m3u8($|\?)/i.test(String(st&&(st.url_resolved||st.url)||''))}
function nativeHls(){try{const a=getPlayer();return !!(a.canPlayType&&a.canPlayType('application/vnd.apple.mpegurl'))}catch{return false}}
function hlsCapable(){return nativeHls()||('MediaSource'in window)}
function key(st){return String(st.stationuuid||stream(st)||st.name||'').toLowerCase()}
function isBad(st){const k=key(st),u=bad.get(k)||0;if(u>Date.now())return true;if(u)bad.delete(k);return false}
function ccOf(st){return String(st.countrycode||'').toUpperCase().slice(0,2)}
/* 방송국명 간소화: 괄호 블록·품질 표기 제거 → 첫 구분자 앞만 → 24자 */
function clean(s){
  let n=String(s||'Unnamed station')
    .replace(/\([^)]*\)|\[[^\]]*\]/g,' ')
    .replace(/\b(online radio|live stream|the best|official|webradio|web radio|mp3|aac|ogg|hls|streaming|stream|[0-9]{2,3}\s?k(bps|bit)?)\b/ig,' ')
    .replace(/\s+/g,' ').trim();
  const cut=n.split(/\s+[-–—|•·:\/]\s+/)[0].trim();
  if(cut.length>=3)n=cut;
  n=n.replace(/[\s\-–—|•·:,\/]+$/,'').trim();
  if(n.length>24)n=n.slice(0,24).replace(/\s+\S*$/,'').trim()||n.slice(0,24).trim();
  return n||'Unnamed station';
}
function countryName(st){
  const cc=ccOf(st);
  if(DISPLAY[cc])return DISPLAY[cc];
  if(REGION&&cc){try{const n=REGION.of(cc);if(n&&n!==cc)return n.toUpperCase()}catch{}}
  return String(st.country||cc||'WORLD').toUpperCase();
}
function genreOf(st){
  const t=String(st.tags||'').split(',').map(x=>x.trim()).filter(x=>x&&x.length<18&&!BAD.test(x));
  return t.length?t[0].toUpperCase():'';
}
/* localStorage 저장용 축약 객체(원본 필드명 유지 → 호환성) */
function slim(st){return{stationuuid:st.stationuuid,name:st.name,country:st.country,countrycode:st.countrycode,url_resolved:stream(st),geo_lat:st.geo_lat,geo_long:st.geo_long,codec:st.codec,bitrate:st.bitrate,hls:st.hls,tags:String(st.tags||'').slice(0,60),favicon:/^https:/.test(String(st.favicon||''))?String(st.favicon).slice(0,200):'',lastcheckok:1,ssl_error:0}}

/* ───────────────────────── 3. 좌표 ───────────────────────── */

/* 대권거리(도 단위) — geo 좌표가 자기 나라 안에 있는지 검증용 */
function gcDeg(a,b){
  const r=Math.PI/180,f1=a[0]*r,f2=b[0]*r,dl=(b[1]-a[1])*r;
  const x=Math.sin(f1)*Math.sin(f2)+Math.cos(f1)*Math.cos(f2)*Math.cos(dl);
  return Math.acos(Math.min(1,Math.max(-1,x)))/r;
}
/* 지구본에 실제로 찍을 좌표.
   ① geo가 자기 나라 허용 반경 안에 있으면 그대로(도시 정밀도 유지)
   ② 아니면 국가 중심점 + 결정적 지터(한 점에 겹치지 않게)
   → 표시 위치가 발표 국가와 어긋나는 일이 원천적으로 없다 */
function displayPoint(st){
  const cc=ccOf(st),cen=CC[cc];
  const la=Number(st.geo_lat),lo=Number(st.geo_long);
  const geoOK=Number.isFinite(la)&&Number.isFinite(lo)&&Math.abs(la)<=90&&Math.abs(lo)<=180&&!(la===0&&lo===0);
  if(cen){
    if(geoOK&&gcDeg([la,lo],cen)<=(BIGR[cc]||R_DEFAULT))return[la,lo];
    let h=0;const k=key(st);for(let i=0;i<k.length;i++)h=(h*31+k.charCodeAt(i))>>>0;
    return[cen[0]+((h%100)/100-.5)*2.2,cen[1]+(((h>>7)%100)/100-.5)*2.2];
  }
  return geoOK?[la,lo]:null;
}
/* 재생 후보 자격 검사(불량 데이터 방어선) */
function looks(st){
  if(!stream(st)||isBad(st))return false;
  if(isHls(st)&&!hlsCapable())return false;   /* HLS: 네이티브도 MSE도 없으면 배제 */
  if(st.lastcheckok!==undefined&&Number(st.lastcheckok)===0)return false;
  if(Number(st.ssl_error)===1)return false;
  if(BAD.test(String(st.tags||''))||BAD.test(String(st.name||'')))return false;
  if(st.bitrate&&Number(st.bitrate)>0&&Number(st.bitrate)<48)return false;
  const c=String(st.codec||'').toLowerCase();
  if(IS_IOS&&/(ogg|opus|vorbis|flac)/.test(c))return false;            /* iOS 미지원 코덱 */
  if(!displayPoint(st))return false;
  return true;
}

/* ─────────────────── 4. Radio Browser API / 채널 풀 ─────────────────── */

function updatePoolUI(){$('poolCount').textContent=pool.size.toLocaleString('en-US')+(pool.size>=POOL_MAX?'+':'')}
function addToPool(arr){
  let added=0;
  for(const st of arr){
    if(pool.size>=POOL_MAX)break;
    if(!looks(st))continue;
    const k=key(st);
    if(pool.has(k))continue;
    pool.set(k,slim(st));added++;
    if(dots.length<250){const p=displayPoint(st);if(p)dots.push({lat:p[0],lon:p[1]})}
  }
  if(added)updatePoolUI();
  return added;
}
/* ── 미러 건강 감시 & 자동 갱신 ──
   공식 문서 경고: "서버 이름은 바뀔 수 있으니 특정 서버 직접 링크 금지."
   → ① 4초 핑(/json/stats)으로 미러별 생존·지연을 기록하고
     ② 살아 있는 미러에서 /json/servers로 현재 서버 목록을 받아
        localStorage에 보관(7일) — 하드코딩 목록이 썩어도 자가 치유.
     ③ 모든 요청은 건강한(빠른) 미러부터 순서대로 시도. */
const MIRROR_KEY='rr_mirrors_v63';
const mirrorHealth=new Map();   /* base → {ok, ms, t} */
let DYN_MIRRORS=[];
function mirrors(){
  const set=new Set([...DYN_MIRRORS,...API]);
  return[...set];
}
function loadMirrors(){
  try{
    const d=JSON.parse(localStorage.getItem(MIRROR_KEY)||'null');
    if(d&&Array.isArray(d.m)&&Date.now()-d.t<7*24*60*60*1000)
      DYN_MIRRORS=d.m.filter(u=>/^https:\/\/[a-z0-9.-]+\.api\.radio-browser\.info$/.test(u));
  }catch{}
}
async function pingMirror(base){
  const t0=Date.now();
  try{
    const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),4000);
    const r=await fetch(base+'/json/stats',{signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok)throw 0;
    await r.json();
    mirrorHealth.set(base,{ok:true,ms:Date.now()-t0,t:Date.now()});
    return true;
  }catch{mirrorHealth.set(base,{ok:false,ms:9999,t:Date.now()});return false}
}
function healthSummary(){
  return mirrors().map(b=>{
    const h=mirrorHealth.get(b),n=b.replace('https://','').split('.')[0];
    return h?(h.ok?n+'✓'+h.ms+'ms':n+'✗'):n+'·';
  }).join('  ');
}
async function pingMirrors(){
  await Promise.all(mirrors().map(pingMirror));
  dlog('mirrors: '+healthSummary());
}
/* 살아 있는 미러에서 현재 서버 목록을 받아 갱신.
   보안: *.api.radio-browser.info 도메인만 수용(저장값 오염 방지) */
async function discoverMirrors(){
  try{
    const arr=await fetchJson('/json/servers');
    const names=[...new Set((arr||[]).map(s=>String(s&&s.name||'').trim().toLowerCase())
      .filter(n=>/^[a-z0-9-]+\.api\.radio-browser\.info$/.test(n)))];
    if(names.length){
      DYN_MIRRORS=names.map(n=>'https://'+n);
      try{localStorage.setItem(MIRROR_KEY,JSON.stringify({t:Date.now(),m:DYN_MIRRORS}))}catch{}
      dlog('discovered '+names.length+' mirrors');
      pingMirrors();
    }
  }catch{}
}
/* 건강한(빠른) 미러 → 미확인 → 불량 순으로 정렬, 'all'은 최후 폴백 */
function orderedMirrors(){
  const list=mirrors(),h=b=>mirrorHealth.get(b);
  const good=list.filter(b=>h(b)&&h(b).ok).sort((a,b)=>h(a).ms-h(b).ms);
  const unknown=shuffle(list.filter(b=>!h(b)));
  const down=list.filter(b=>h(b)&&!h(b).ok);
  return[...good,...unknown,...down];
}
/* 미러 순차 시도 + 'all' 최후 폴백, 요청당 8초 타임아웃 */
async function fetchJson(pathq){
  const bases=[...orderedMirrors().slice(0,4),API_LAST];
  let err;
  for(const base of bases){
    try{
      const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),8000);
      const r=await fetch(base+pathq,{headers:{Accept:'application/json'},signal:ctrl.signal});
      clearTimeout(t);
      if(!r.ok)throw Error(r.status);
      lastClickBase=base;
      if(base!==API_LAST)mirrorHealth.set(base,{ok:true,ms:(mirrorHealth.get(base)||{}).ms||500,t:Date.now()});
      return await r.json();
    }catch(e){
      err=e;
      if(base!==API_LAST)mirrorHealth.set(base,{ok:false,ms:9999,t:Date.now()});
      dlog('mirror fail '+base.replace('https://','').split('.')[0]+' '+((e&&(e.name==='AbortError'?'timeout':(e.message||e.name)))||''));
    }
  }
  dlog('all mirrors failed');
  throw err||Error('all mirrors failed');
}
/* 서버 쪽 필터를 최대한 활용: hidebroken + HTTPS */
function searchQuery(extra){
  const q=new URLSearchParams({hidebroken:'true',is_https:'true',limit:'150'});
  for(const[k,v]of Object.entries(extra))q.set(k,v);
  return'/json/stations/search?'+q;
}
function savePoolCache(){
  try{localStorage.setItem(CACHE_KEY,JSON.stringify({t:Date.now(),s:[...pool.values()].slice(0,4500)}))}catch{}
}
/* 죽은 스트림 블랙리스트 영속화: 오늘 죽어 있던 채널을 내일 또
   시도하지 않는다. 만료 12시간, 최대 400건으로 용량 관리 */
function saveBad(){
  try{
    const now=Date.now();
    const arr=[...bad.entries()].filter(([,u])=>u>now).slice(-400);
    localStorage.setItem(BAD_KEY,JSON.stringify(arr));
  }catch{}
}
function loadBad(){
  try{
    const arr=JSON.parse(localStorage.getItem(BAD_KEY)||'[]');
    const now=Date.now();
    for(const[k,u]of arr)if(u>now)bad.set(k,u);
  }catch{}
}
function loadPoolCache(){
  try{
    const raw=localStorage.getItem(CACHE_KEY);if(!raw)return false;
    const d=JSON.parse(raw);
    if(!d||!Array.isArray(d.s)||Date.now()-d.t>CACHE_TTL)return false;
    addToPool(d.s);
    return pool.size>=600;
  }catch{return false}
}
let building=false;
async function buildPool(){
  if(building)return;building=true;
  try{
    const tags=shuffle([...MUSIC_TAGS]);
    /* 1단계: 전체 DB 무작위 스윕("List of all radio stations"와 동일한
       대상). 요청당 400건씩 크게 받아 호출 수는 줄이고 수확은 늘린다 */
    for(let i=0;i<6;i++){
      if(pool.size>=POOL_TARGET)break;
      try{
        const arr=await fetchJson(searchQuery({order:'random',limit:'400',offset:String(Math.floor(Math.random()*20000))}));
        addToPool(arr);
      }catch{}
      await sleep(150);
    }
    /* 신뢰도 앵커: 전 세계 투표 상위 + 최근 인기 방송국(살아 있을 확률이
       가장 높은 집단)을 섞어 풀의 '재생 성공률' 바닥을 끌어올린다 */
    for(const order of['votes','clicktrend']){
      try{
        const arr=await fetchJson(searchQuery({order,reverse:'true',limit:'400'}));
        addToPool(arr);
      }catch{}
      await sleep(150);
    }
    /* 2단계: 장르별 검색으로 음악 밀도 보강 — 목표치까지 */
    for(const tag of tags){
      if(pool.size>=POOL_TARGET)break;
      try{
        const arr=await fetchJson(searchQuery({tag,order:'votes',reverse:'true',limit:'200',offset:String(Math.floor(Math.random()*80))}));
        addToPool(arr);
      }catch{}
      await sleep(150);
    }
    savePoolCache();
  }finally{building=false;updatePoolUI()}
}
/* 주기적 보충: 전체 DB 스윕과 장르 쿼리를 번갈아 소량 추가 */
let topUpFlip=false;
async function topUp(){
  if(building||pool.size>=POOL_MAX)return;
  topUpFlip=!topUpFlip;
  const q=topUpFlip
    ?{order:'random',limit:'120',offset:String(Math.floor(Math.random()*20000))}
    :{tag:MUSIC_TAGS[Math.floor(Math.random()*MUSIC_TAGS.length)],order:'random',limit:'120'};
  try{
    const arr=await fetchJson(searchQuery(q));
    addToPool(arr);savePoolCache();
  }catch{}
}
/* 재생 시 클릭 카운트 보고 — Radio Browser 공식 권장 사항 */
function reportClick(st){
  const u=String(st.stationuuid||'');
  if(!u||u.startsWith('seed-'))return;
  try{fetch(lastClickBase+'/json/url/'+encodeURIComponent(u)).catch(()=>{})}catch{}
}

/* ───────────────────────── 5. 오디오 엔진 ─────────────────────────
   핵심 설계: 앱 전체가 단 하나의 <audio> 요소를 재사용한다.
   iOS 사파리는 사용자 제스처 호출 스택 안의 play()만 허용하므로,
   첫 탭에서 무음 WAV로 요소를 '잠금 해제'해 두면 이후 await를
   건너뛰며 후보를 갈아타도 재생이 차단되지 않는다. */

/* ── 튜닝 노이즈 ──
   다이얼을 돌리는 순간의 지직거림. Web Audio 로컬 생성이라 CORS 무관.
   ※ 제거하려면 playNext 안의 playStatic() 한 줄만 지우면 된다 */
let actx=null;
function ensureAudioCtx(){
  try{
    if(!actx){const AC=window.AudioContext||window.webkitAudioContext;if(AC)actx=new AC()}
    if(actx&&actx.state==='suspended')actx.resume().catch(()=>{});
  }catch{}
}
function playStatic(){
  try{
    if(!actx||actx.state!=='running')return;
    const dur=.42,sr=actx.sampleRate;
    const buf=actx.createBuffer(1,Math.floor(sr*dur),sr),ch=buf.getChannelData(0);
    for(let i=0;i<ch.length;i++)ch[i]=(Math.random()*2-1)*.6;
    const src=actx.createBufferSource();src.buffer=buf;
    const bp=actx.createBiquadFilter();bp.type='bandpass';bp.Q.value=.8;
    bp.frequency.setValueAtTime(700,actx.currentTime);
    bp.frequency.exponentialRampToValueAtTime(2600,actx.currentTime+dur);
    const g=actx.createGain();
    g.gain.setValueAtTime(0,actx.currentTime);
    g.gain.linearRampToValueAtTime(.09,actx.currentTime+.05);
    g.gain.linearRampToValueAtTime(0,actx.currentTime+dur);
    src.connect(bp);bp.connect(g);g.connect(actx.destination);
    src.start();src.stop(actx.currentTime+dur+.02);
  }catch{}
}
const SILENT_WAV='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=';
let player=null,unlocked=false,playToken=0;
function getPlayer(){
  if(player)return player;
  player=new Audio();
  player.preload='auto';
  player.playsInline=true;
  player.setAttribute('playsinline','');
  try{player.volume=savedVolume}catch{}
  return player;
}
function unlock(){
  if(unlocked)return;
  const a=getPlayer();
  try{
    a.src=SILENT_WAV;
    const p=a.play();
    if(p&&p.catch)p.catch(()=>{});
    unlocked=true;
  }catch{}
}
/* ── HLS 엔진 ──
   정석 패턴(hls.js 공식 문서): Safari 계열은 <audio>에 .m3u8을 직접
   꽂는 네이티브 재생(CORS 불필요·저전력), 그 외 MSE 브라우저는
   hls.js를 '첫 HLS 채널을 만날 때' CDN에서 지연 로드해 사용.
   hls.js 경로는 스트림에 CORS 헤더가 필요하므로 실패 시 일반
   폴백(다음 후보)으로 흘려보낸다. */
let hlsLib=null,hlsLoading=null,hlsInstance=null;
function loadHlsLib(){
  if(hlsLib)return Promise.resolve(hlsLib);
  if(window.Hls){hlsLib=window.Hls;return Promise.resolve(hlsLib)}
  if(hlsLoading)return hlsLoading;
  hlsLoading=new Promise(res=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/hls.js@1';
    s.onload=()=>{hlsLib=window.Hls||null;res(hlsLib)};
    s.onerror=()=>res(null);
    document.head.appendChild(s);
  });
  return hlsLoading;
}
function destroyHls(){if(hlsInstance){try{hlsInstance.destroy()}catch{}hlsInstance=null}}

/* 한 방송국 재생 시도. 성공하면 station, 실패하면 null.
   ★ v58 치명 버그 수정: 사파리는 미디어 요소가 에러 상태에 빠지면
     load()로 초기화하기 전까지 죽은 채로 남는다. 재사용 요소에
     src만 바꾸면 첫 실패 후 모든 후보가 즉사 → src 교체 직후
     반드시 load()를 호출한다. */
function playOne(st,ms=6000,bust=false){
  return new Promise(resolve=>{
    /* bust=true: 재접속용 일회용 파라미터로 브라우저/프록시의 낡은
       연결을 우회해 라이브 최신 지점에 새로 붙는다(순단 후 과거
       오디오를 이어 트는 문제 방지). 1차 재접속은 원본 URL 유지 —
       파라미터를 거부하는 서버 대비 */
    const a=getPlayer();
    const token=++playToken;               /* 뒤늦게 도착하는 낡은 콜백 무효화 */
    try{a.onplaying=a.oncanplay=a.onerror=null;a.pause()}catch{}
    destroyHls();
    let done=false;
    const timer=setTimeout(()=>fail(true,'timeout'),ms);
    const ok=()=>{
      if(done||token!==playToken)return;
      done=true;clearTimeout(timer);resolve(st);
    };
    const fail=(b,why)=>{
      if(done||token!==playToken)return;
      done=true;clearTimeout(timer);
      if(b){
        /* 미디어 에러(스트림 자체 불량)=12시간, 타임아웃(일시적일 수 있음)=35분 차단.
           죽은 채널은 풀에서도 제거해 채널 수가 '재생 가능한 수'에 수렴하게 한다 */
        const ttl=why==='media'?12*60*60*1000:35*60*1000;
        bad.set(key(st),Date.now()+ttl);
        pool.delete(key(st));
        updatePoolUI();
        saveBad();
      }
      dlog('fail['+(why||'?')+'] '+clean(st.name));
      resolve(null);
    };
    a.onplaying=ok;
    /* canplay는 '재생 가능할 수도 있다'는 신호일 뿐이므로 즉시 성공
       처리하지 않고 1.6초 유예를 둔다. 그 사이 playing이 오면 성공,
       유예가 끝났는데 요소가 멈춰 있지 않으면 성공으로 간주.
       (그래도 새는 오탐은 와치독이 10초 내에 잡아 재접속한다) */
    a.oncanplay=()=>{
      if(done||token!==playToken)return;
      setTimeout(()=>{
        if(done||token!==playToken)return;
        if(!a.paused)ok();else fail(true,'nosound');
      },1600);
    };
    a.onerror=()=>fail(true,'media');
    const startPlay=()=>{
      try{
        const p=a.play();
        /* 자동재생 정책(NotAllowedError)·자체 중단(AbortError)은
           방송국 잘못이 아니므로 블랙리스트에 넣지 않는다 */
        if(p&&p.catch)p.catch(e=>{const n=e&&e.name;fail(n!=='NotAllowedError'&&n!=='AbortError',n||'reject')});
      }catch(e){fail(true,(e&&e.name)||'throw')}
    };
    const srcUrl=stream(st)+(bust?((stream(st).includes('?')?'&':'?')+'_rr='+Date.now()):'');
    if(isHls(st)&&!nativeHls()){
      /* hls.js 경로 (Chrome/Firefox 등) — CORS 필요, 실패 시 일반 폴백 */
      loadHlsLib().then(H=>{
        if(done||token!==playToken)return;
        if(!H||!H.isSupported()){fail(true,'no-hls');return}
        try{
          hlsInstance=new H({enableWorker:false});
          hlsInstance.on(H.Events.ERROR,(ev,data)=>{
            if(data&&data.fatal)fail(true,'hls-'+(data.type||'fatal'));
          });
          hlsInstance.loadSource(srcUrl);
          hlsInstance.attachMedia(a);
          startPlay();
        }catch(e){fail(true,'hls-init')}
      });
    }else{
      /* 일반 스트림 또는 네이티브 HLS(Safari/iOS) — 동일 경로 */
      a.src=srcUrl;
      try{a.load()}catch{}                 /* ★ 에러 상태 리셋 — 절대 제거 금지 */
      startPlay();
    }
  })
}
/* 완전 정지(전 후보 실패·슬립 타이머 종료 시 데이터 낭비 방지) */
function hardStop(){
  userPaused=true;stopWatchdog();destroyHls();
  const a=player;if(!a)return;
  try{a.onplaying=a.oncanplay=a.onerror=a.onended=a.onwaiting=null;a.pause();a.removeAttribute('src');a.load()}catch{}
}
/* 이번 탭의 재생 후보 목록: 풀에서 최근 국가 회피 + 셔플,
   마지막 안전망으로 시드(FIP 편중 방지를 위해 프랑스 시드 제외) */
function candidates(){
  /* 단계적 완화: 정상 필터로 후보가 비면 played 해제 → 국가 제한 해제
     순으로 풀어, 장시간 사용·API 장애가 겹쳐도 후보가 고갈되지 않는다 */
  const base=[...pool.values()].filter(st=>looks(st));
  let raw=base.filter(st=>!played.has(key(st)));
  const fresh=raw.filter(st=>!recentCountries.includes(ccOf(st)));
  if(fresh.length>=8)raw=fresh;
  if(!raw.length)raw=base;                       /* 완화 ①: played 해제 */
  raw=shuffle(raw);
  /* 다양성: 후보 앞줄은 국가가 겹치지 않게 뽑는다(한 국가 1곳),
     그 뒤에 나머지를 채워 같은 나라 연속 방문 체감을 줄인다 */
  const seenCC=new Set(),uniq=[],rest=[];
  for(const st of raw){const c=ccOf(st);if(!seenCC.has(c)){seenCC.add(c);uniq.push(st)}else rest.push(st)}
  raw=[...uniq,...rest].slice(0,12);
  /* 네이티브 HLS가 없는 환경(Chrome류)에서는 CORS 실패 가능성이 있는
     HLS 채널을 뒤로 미뤄 헛탭을 줄인다 */
  if(!nativeHls())raw.sort((a,b)=>(isHls(a)?1:0)-(isHls(b)?1:0));
  /* 비상 안전망 2단: ① 최근 실제 재생에 성공한 채널(동적 시드)
     ② 정적 시드. 각 단계도 국가 필터로 비면 필터를 풀어 반드시 채운다 */
  let dyn=shuffle(proven.filter(st=>looks(st)&&!recentCountries.includes(ccOf(st))));
  if(!dyn.length)dyn=shuffle(proven.filter(st=>looks(st)));          /* 완화 ② */
  let emergency=shuffle(SEEDS.filter(st=>!isBad(st)&&st.countrycode!=='FR'&&!recentCountries.includes(ccOf(st))));
  if(!emergency.length)emergency=shuffle(SEEDS.filter(st=>!isBad(st))); /* 완화 ③: 국가·FIP 제한 해제 */
  return[...raw,...dyn,...emergency].slice(0,14);
}

}

const TZ={AD:'Europe/Andorra',AE:'Asia/Dubai',AF:'Asia/Kabul',AG:'America/Antigua',AL:'Europe/Tirane',AM:'Asia/Yerevan',AO:'Africa/Luanda',AR:'America/Argentina/Buenos_Aires',AT:'Europe/Vienna',AZ:'Asia/Baku',BA:'Europe/Sarajevo',BB:'America/Barbados',BD:'Asia/Dhaka',BE:'Europe/Brussels',BF:'Africa/Ouagadougou',BG:'Europe/Sofia',BH:'Asia/Bahrain',BI:'Africa/Bujumbura',BJ:'Africa/Porto-Novo',BN:'Asia/Brunei',BO:'America/La_Paz',BS:'America/Nassau',BT:'Asia/Thimphu',BW:'Africa/Gaborone',BY:'Europe/Minsk',BZ:'America/Belize',CD:'Africa/Kinshasa',CF:'Africa/Bangui',CG:'Africa/Brazzaville',CH:'Europe/Zurich',CI:'Africa/Abidjan',CL:'America/Santiago',CM:'Africa/Douala',CN:'Asia/Shanghai',CO:'America/Bogota',CR:'America/Costa_Rica',CU:'America/Havana',CV:'Atlantic/Cape_Verde',CY:'Asia/Nicosia',CZ:'Europe/Prague',DE:'Europe/Berlin',DJ:'Africa/Djibouti',DK:'Europe/Copenhagen',DO:'America/Santo_Domingo',DZ:'Africa/Algiers',EC:'America/Guayaquil',EE:'Europe/Tallinn',EG:'Africa/Cairo',ER:'Africa/Asmara',ES:'Europe/Madrid',ET:'Africa/Addis_Ababa',FI:'Europe/Helsinki',FJ:'Pacific/Fiji',FR:'Europe/Paris',GA:'Africa/Libreville',GB:'Europe/London',GE:'Asia/Tbilisi',GH:'Africa/Accra',GM:'Africa/Banjul',GN:'Africa/Conakry',GR:'Europe/Athens',GT:'America/Guatemala',GY:'America/Guyana',HK:'Asia/Hong_Kong',HN:'America/Tegucigalpa',HR:'Europe/Zagreb',HT:'America/Port-au-Prince',HU:'Europe/Budapest',IE:'Europe/Dublin',IL:'Asia/Jerusalem',IN:'Asia/Kolkata',IQ:'Asia/Baghdad',IR:'Asia/Tehran',IS:'Atlantic/Reykjavik',IT:'Europe/Rome',JM:'America/Jamaica',JO:'Asia/Amman',JP:'Asia/Tokyo',KE:'Africa/Nairobi',KG:'Asia/Bishkek',KH:'Asia/Phnom_Penh',KP:'Asia/Pyongyang',KR:'Asia/Seoul',KW:'Asia/Kuwait',KZ:'Asia/Almaty',LA:'Asia/Vientiane',LB:'Asia/Beirut',LI:'Europe/Vaduz',LK:'Asia/Colombo',LR:'Africa/Monrovia',LS:'Africa/Maseru',LT:'Europe/Vilnius',LU:'Europe/Luxembourg',LV:'Europe/Riga',LY:'Africa/Tripoli',MA:'Africa/Casablanca',MC:'Europe/Monaco',MD:'Europe/Chisinau',ME:'Europe/Podgorica',MG:'Indi function zoneFor(st){
  const cc=ccOf(st);
  const p=displayPoint(st),lon=p?p[1]:null;
  if(lon!=null){ /* 다시간대 대국: 경도 구간 → 대표 시간대 */
    if(cc==='US')return lon<-130?'Pacific/Honolulu':lon<-115?'America/Los_Angeles':lon<-102?'America/Denver':lon<-87?'America/Chicago':'America/New_York';
    if(cc==='CA')return lon<-114?'America/Vancouver':lon<-90?'America/Winnipeg':'America/Toronto';
    if(cc==='RU')return lon<52?'Europe/Moscow':lon<75?'Asia/Yekaterinburg':lon<105?'Asia/Krasnoyarsk':lon<130?'Asia/Yakutsk':'Asia/Vladivostok';
    if(cc==='BR')return lon<-55?'America/Manaus':'America/Sao_Paulo';
    if(cc==='AU')return lon<129?'Australia/Perth':lon<141?'Australia/Adelaide':'Australia/Sydney';
    if(cc==='ID')return lon<115?'Asia/Jakarta':lon<135?'Asia/Makassar':'Asia/Jayapura';
  }
  return TZ[cc]||null;
}
function renderClock(){
  const el=$('clock');
  el.textContent='';
  let h,m;
  const z=current?zoneFor(current):null;
  if(!current){ /* 아직 여행 전: 내 현지 시각(침대맡 시계 모드) */
    const d=new Date();h=d.getHours();m=d.getMinutes();
  }else if(z){ /* IANA 시간대 + Intl → 서머타임 자동 반영 (국제표준) */
    try{
      const parts=new Intl.DateTimeFormat('en-US',{timeZone:z,hour:'numeric',minute:'2-digit',hour12:false}).formatToParts(new Date());
      h=Number(parts.find(x=>x.type==='hour').value)%24;
      m=Number(parts.find(x=>x.type==='minute').value);
    }catch{h=null}
  }
  if(current&&h==null){ /* 시간대 미등록 소지역: 경도 태양시 근사 폴백 */
    if(currentLon==null)return;
    const d=new Date(Date.now()+Math.round(currentLon/15)*3600e3);
    h=d.getUTCHours();m=d.getUTCMinutes();
  }
  const ap=h>=12?'PM':'AM';h=h%12||12;
  const digits=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  for(const ch of digits){
    const c=document.createElement('span');
    if(ch===':'){c.className='fcol';c.textContent=':'}
    else{c.className='fd';c.textContent=ch}
    el.appendChild(c);
  }
  const a=document.createElement('span');
  a.className='fap';a.textContent=ap;
  el.appendChild(a);
}

  if('mediaSession'in navigator){

      navigator.mediaSession.metadata=new MediaMetadata({title:clean(st.name),artist:countryName(st),album:'Random Radio',artwork:art});

      navigator.mediaSession.setActionHandler('pause',()=>{userPaused=true;try{player&&player.pause()}catch{};$('info').classList.add('paused');setMSState('paused')});
      navigator.mediaSession.setActionHandler('nexttrack',()=>{autoRetries=0;playNext()});

/* 랜덤 여행 본체: 후보를 순서대로 시도, 전부 실패 시 자동 2회 재시도 */
async function playNext(){
  if(switching)return;switching=true;started=true;userPaused=false;
  $('globeArea').classList.add('started');   /* tap 힌트는 첫 여행부터 숨김 */
  playStatic();                               /* 다이얼 지직음(튜닝 노이즈) */
  setBusy(true);
  stopWatchdog();
  let cand=candidates();
  /* 마지막 청취 방송국 복원: 첫 탭 한정으로 최우선 후보에 배치 */
  if(resumeStation){cand.unshift(resumeStation);resumeStation=null}
  let ok=null;
  for(const st of cand){
    ok=await playOne(st,String(st.stationuuid||'').startsWith('seed-')?6500:6000);
    if(ok)break;
  }
  if(ok){
    autoRetries=0;reconnects=0;
    current=ok;
    played.add(key(ok));
    if(played.size>600)played=new Set([...played].slice(-300));
    const cc=ccOf(ok);
    if(cc){
      recentCountries=[cc,...recentCountries.filter(x=>x!==cc)].slice(0,15);
      if(!visited.has(cc)){visited.add(cc);saveCountries();updateStatsUI()}
    }
    const p=displayPoint(ok);
    if(p&&dots.length<250)dots.push({lat:p[0],lon:p[1]});
    setNowPlaying(ok);
    reportClick(ok);
    saveLast(ok);
    saveProven(ok);
    dlog('play '+clean(ok.name)+' ['+ccOf(ok)+']');
    setBusy(false);switching=false;
    startWatchdog();
  }else if(autoRetries<2){
    /* 사용자를 귀찮게 하기 전에 조용히 한 번 더 여행 */
    autoRetries++;
    $('country').textContent='TRAVELLING';
    $('station').textContent='';
    $('genre').textContent='';
    switching=false;
    setTimeout(playNext,700);
  }else{
    autoRetries=0;
    hardStop();
    $('country').textContent='NO SIGNAL';
    $('station').textContent='';
    $('genre').textContent='';
    setBusy(false);switching=false;
  }
}

/* ─────────────── 5.5 재생 와치독 (재생 중 안정화) ───────────────
   인터넷 라디오는 재생 '시작'보다 재생 '중' 끊김이 더 흔하다.
   5초 간격으로 재생 진행(currentTime)을 감시해 2회 연속 멈춰 있으면
   끊김으로 판정 → 같은 방송국 재접속 2회 → 그래도 안 되면 다음
   방송국으로 자동 이동. ended/error 이벤트는 즉시 복구 절차 진입.
   사용자가 직접 멈춘 경우(userPaused)는 절대 건드리지 않는다. */

function startWatchdog(){
  stopWatchdog();
  lastMediaTime=-1;stallStrikes=0;
  const a=getPlayer();
  a.onended=()=>{if(!switching){dlog('stream ended');recover('ended')}};
  a.onerror=()=>{if(!switching&&!reconnecting){dlog('stream error');recover('error')}};
  /* 버퍼 고갈(waiting) 조기 경보: 5초 폴링보다 빠르게 끊김을 잡는다.
     waiting은 정상 버퍼링에서도 뜨므로 6초 단발 타이머로 걸러,
     그 안에 재생이 진행되지 못했을 때만 복구에 들어간다 */
  a.onwaiting=()=>{
    if(!current||switching||userPaused||reconnecting||waitTimer)return;
    waitT=a.currentTime||0;
    dlog('buffering…');
    waitTimer=setTimeout(()=>{
      waitTimer=null;
      if(!current||switching||userPaused||reconnecting)return;
      if((a.currentTime||0)<=waitT+0.1)recover('waiting');
    },6000);
  };
  a.onplaying=()=>{if(waitTimer){clearTimeout(waitTimer);waitTimer=null}};
  watchTimer=setInterval(watchTick,5000);
}
function stopWatchdog(){
  if(watchTimer){clearInterval(watchTimer);watchTimer=null}
  if(waitTimer){clearTimeout(waitTimer);waitTimer=null}
}
function watchTick(){
  if(!current||switching||userPaused||reconnecting||!player)return;
  const a=player;
  if(a.paused){
    stallStrikes++;
    dlog('paused unexpectedly ('+stallStrikes+'/2)');
  }else{
    const t=a.currentTime||0;
    if(t===lastMediaTime){stallStrikes++;dlog('no progress ('+stallStrikes+'/2)')}
    else stallStrikes=0;
    lastMediaTime=t;
  }
  if(stallStrikes>=2){stallStrikes=0;recover('stall')}
}
async function recover(why){
  if(reconnecting||switching||!current||userPaused)return;
  reconnecting=true;
  try{
    /* 백그라운드 복귀·네트워크 복구는 우선 같은 src를 그대로 재개 시도
       (가장 저렴하고, iOS가 오디오만 죽인 경우 대부분 이걸로 살아난다) */
    if(why==='visible'||why==='online'){
      try{
        const p=player.play();if(p)await p;
        dlog('resumed ('+why+')');
        return;
      }catch(e){
        if(e&&e.name==='NotAllowedError'){
          /* 정책 차단: 다음 탭이 이 방송국을 잇도록 예약하고 안내만 */
          resumeStation=slim(current);
          $('genre').textContent='TAP TO RESUME';
          dlog('resume blocked → tap to resume');
          return;
        }
      }
    }
    /* 같은 방송국 재접속 (한 사고당 최대 2회 연속, 지수 백오프):
       1차는 즉시·원본 URL, 2차는 2초 대기 후 캐시 버스팅 URL —
       터널·엘리베이터 같은 몇 초짜리 순단에서 2차 성공률을 높인다 */
    while(reconnects<2){
      reconnects++;
      dlog('reconnect #'+reconnects+' ('+why+') '+clean(current.name));
      $('genre').textContent='RECONNECTING…';
      if(reconnects===2){
        await sleep(2000);
        if(switching||userPaused||!current)return;
      }
      const ok=await playOne(current,6000,reconnects===2);
      if(ok){
        /* 1차 실패가 남긴 블랙리스트·풀 제거를 원상 복구 —
           살아 있음이 방금 증명됐으므로 */
        bad.delete(key(current));
        if(!pool.has(key(current))){pool.set(key(current),slim(current));updatePoolUI()}
        $('genre').textContent=genreOf(current);
        dlog('reconnected');
        startWatchdog();
        return;
      }
    }
    /* 복구 실패 → 여행 계속 (다음 방송국) */
    dlog('recovery failed → next station');
    autoRetries=0;
    reconnecting=false;   /* playNext 진입 전에 해제 */
    playNext();
  }finally{reconnecting=false}
}
/* 네트워크 전환(Wi-Fi↔LTE)·복귀 감지 */
if(window.addEventListener){
  window.addEventListener('online',()=>{dlog('network online');if(current&&!userPaused&&player&&player.paused)recover('online')});
  window.addEventListener('offline',()=>dlog('network offline'));
}

/* ───────────────────────── 6. 슬립 타이머 ─────────────────────────
   ☾ 버튼: OFF → 15분 → 30분 → 60분 → OFF 순환.
   종료 20초 전부터 볼륨 페이드아웃(iOS는 볼륨 제어가 막혀 있어
   페이드는 무시되고 정시에 정지만 된다), 끝나면 "Good night." */

const SLEEP_STEPS=[0,15,30,60];
let sleepIdx=0,sleepEnd=0,sleepTimer=null;
function cycleSleep(){
  sleepIdx=(sleepIdx+1)%SLEEP_STEPS.length;
  const min=SLEEP_STEPS[sleepIdx];
  if(sleepTimer){clearInterval(sleepTimer);sleepTimer=null}
  try{if(player)player.volume=savedVolume}catch{}
  if(!min){sleepEnd=0;updateSleepUI();return}
  sleepEnd=Date.now()+min*60*1000;
  sleepTimer=setInterval(sleepTick,1000);
  updateSleepUI();
}
function sleepTick(){
  const left=sleepEnd-Date.now();
  if(left<=0){
    clearInterval(sleepTimer);sleepTimer=null;sleepIdx=0;sleepEnd=0;
    hardStop();
    try{if(player)player.volume=savedVolume}catch{}
    $('country').textContent='SLEEP';
    $('station').textContent='Good night.';
    $('genre').textContent='';
    updateSleepUI();
    return;
  }
  /* 마지막 20초 페이드아웃 */
  if(left<=20000){try{if(player)player.volume=savedVolume*Math.max(0,left/20000)}catch{}}
  updateSleepUI();
}
function updateSleepUI(){
  const btn=$('sleep'),info=$('sleepInfo');
  const on=sleepEnd>0;
  btn.classList.toggle('sleepOn',on);
  if(!on){info.textContent='';return}
  const left=Math.max(0,sleepEnd-Date.now());
  const m=Math.floor(left/60000),s=Math.floor(left%60000/1000);
  info.textContent='sleep in '+m+':'+String(s).padStart(2,'0');
}

/* ─────────────── 7. 즐겨찾기 / 마지막 청취 상태 ─────────────── */

/* XSS 방지를 위해 textContent로만 조립. 행은 div(중첩 버튼 금지) */
function renderFavs(){

$('sleep').onclick=cycleSleep;
/* 방송국명 탭 = 일시정지/재개. 화면에 버튼을 늘리지 않는 정지 수단.

/* 서랍을 아래로 스와이프해 닫기. 목록이 맨 위일 때만 드래그를 시작해

$('globeBtn').onclick=()=>{unlock();ensureAudioCtx();autoRetries=0;playNext()};

/* ── 밤의 반구 ──
   태양 적위·시각으로 지금 밤인 반구를 계산해 지구본에 그린다.
   시계가 "리스본은 새벽 4시"라고 말하면 지구본이 눈으로 보여준다.
   외부 의존성 없음(수식 몇 줄), 1분에 한 번만 재계산 */
let nightGeo=null,nightStamp=0;
function updateNight(){
  if(!window.d3)return;
  const now=new Date(),stamp=Math.floor(now.getTime()/60000);
  if(stamp===nightStamp&&nightGeo)return;
  nightStamp=stamp;
  const start=Date.UTC(now.getUTCFullYear(),0,0);
  const doy=(now.getTime()-start)/86400000;
  const decl=-23.44*Math.cos(2*Math.PI/365*(doy+10));            /* 태양 적위 */
  const utcH=now.getUTCHours()+now.getUTCMinutes()/60;
  const sunLon=((12-utcH)*15+540)%360-180;                        /* 태양 직하점 경도 */
  const anti=[((sunLon+180+540)%360)-180,-decl];                  /* 반태양점 */
  try{nightGeo=window.d3.geoCircle().center(anti).radius(90).precision(4)()}catch{nightGeo=null}
}
/* ── 대권항로 비행 ──
   이전 방송국 → 새 방송국을 지구 표면 최단 항로(great circle)로
   실제 비행한다. 소리는 도착을 기다리지 않고 즉시 시작(라디오 우선),
   비행은 시각 연출. 누적 비행거리는 localStorage에 쌓인다. */
/* 방문국 기록: 실제 재생에 성공한 나라만 센다 */
const COUNTRIES_KEY='rr_countries_v73';let visited=new Set();
function loadCountries(){try{visited=new Set(JSON.parse(localStorage.getItem(COUNTRIES_KEY)||'[]'))}catch{visited=new Set()}}
function saveCountries(){try{localStorage.setItem(COUNTRIES_KEY,JSON.stringify([...visited]))}catch{}}
function updateStatsUI(){try{$('countryCount').textContent=visited.size+(visited.size===1?' country':' countries')}catch{}}
let flight=null,lastPoint=null,tripKm=0;
const TRIP_KEY='rr_trip_v71';
function loadTrip(){try{tripKm=Number(localStorage.getItem(TRIP_KEY))||0}catch{tripKm=0}}
function saveTrip(){try{localStorage.setItem(TRIP_KEY,String(Math.round(tripKm)))}catch{}}
function updateTripUI(){try{$('tripKm').textContent=Math.round(tripKm).toLocaleString('en-US')+' km'}catch{}}
function startFlight(from,to){
  if(!window.d3||!from||!to)return false;
  const distKm=gcDeg(from,to)*111.2;
  if(distKm<300)return false;                    /* 근거리는 비행 생략 */
  const interp=window.d3.geoInterpolate([from[1],from[0]],[to[1],to[0]]);
  flight={interp,start:performance.now(),dur:Math.min(3600,1400+distKm*0.10),to};
  tripKm+=distKm;saveTrip();updateTripUI();
  return true;
}
/* 매 프레임: 비행 중이면 지구본이 비행기를 따라 회전 */
function flightStep(ts){
  if(!flight)return false;
  const t=Math.min(1,(ts-flight.start)/flight.dur);
  const e=t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;   /* 느긋한 이륙·착륙(cubic) */
  const[lo,la]=flight.interp(e);
  rotation[0]+=shortDelta(rotation[0],-lo)*.35;
  rotation[1]+=(-la-rotation[1])*.35;
  if(t>=1){
    const to=flight.to;flight=null;
    targetRotation=[-to[1],-to[0],0];
  }
  return true;
}

/* ───────────────────────── 8. 지구본 렌더링 ─────────────────────────
   배터리 배려: ① 30fps 상한 ② 탭이 백그라운드로 가면 렌더링을
   완전히 멈추고(오디오는 계속) 다시 보이면 재개 */

function resize(){
  const rect=canvas.getBoundingClientRect(),dpr=Math.min(window.devicePixelRatio||1,2);
  width=Math.max(300,Math.floor(rect.width*dpr));height=Math.max(300,Math.floor(rect.height*dpr));
  canvas.width=width;canvas.height=height;
  if(window.d3){
    projection=d3.geoOrthographic().translate([width/2,height/2]).scale(Math.min(width,height)*.472).clipAngle(90).precision(.25).rotate(rotation);
    path=d3.geoPath(projection,ctx);graticule=d3.geoGraticule10();
  }
  draw();
}
function visible(lon,lat){return !window.d3||d3.geoDistance([lon,lat],[-rotation[0],-rotation[1]])<Math.PI/2}
function project(lat,lon){return projection&&visible(lon,lat)?projection([lon,lat]):null}
function draw(){
  ctx.clearRect(0,0,width,height);
  const cx=width/2,cy=height/2,r=Math.min(width,height)*.472;
  const bg=ctx.createRadialGradient(cx-r*.42,cy-r*.46,r*.04,cx,cy,r*1.15);
  bg.addColorStop(0,'#3a3f43');bg.addColorStop(.38,'#171c20');bg.addColorStop(1,'#020304');
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();
  if(projection&&path){
    projection.rotate(rotation);
    ctx.beginPath();path({type:'Sphere'});ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=Math.max(1,width/520);ctx.stroke();
    ctx.beginPath();path(graticule);ctx.strokeStyle='rgba(255,255,255,.105)';ctx.lineWidth=Math.max(.55,width/900);ctx.stroke();
    if(land){ctx.beginPath();path(land);ctx.fillStyle='#272c30';ctx.fill();ctx.strokeStyle='rgba(255,255,255,.17)';ctx.lineWidth=Math.max(.5,width/980);ctx.stroke()}
    if(nightGeo){ /* 밤 반구 + 터미네이터(황혼선) */
      ctx.beginPath();path(nightGeo);
      ctx.fillStyle='rgba(2,5,11,.44)';ctx.fill();
      ctx.strokeStyle='rgba(255,196,140,.12)';ctx.lineWidth=Math.max(1,width/460);ctx.stroke();
    }
    for(const g of dots){const p=project(g.lat,g.lon);if(!p)continue;ctx.beginPath();ctx.arc(p[0],p[1],Math.max(.9,width/440),0,Math.PI*2);ctx.fillStyle='rgba(255,45,62,.42)';ctx.fill()}
    if(flight){
      const t=Math.min(1,(performance.now()-flight.start)/flight.dur);
      const e=t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
      /* 지나온 항로 궤적 */
      ctx.beginPath();let pen=false;
      for(let i=0;i<=28;i++){
        const q=e*i/28,[lo,la]=flight.interp(q),pp=project(la,lo);
        if(!pp){pen=false;continue}
        if(!pen){ctx.moveTo(pp[0],pp[1]);pen=true}else ctx.lineTo(pp[0],pp[1]);
      }
      ctx.strokeStyle='rgba(90,255,170,.55)';ctx.lineWidth=Math.max(1,width/520);
      ctx.setLineDash([Math.max(2,width/260),Math.max(3,width/210)]);ctx.stroke();ctx.setLineDash([]);
      /* 여객기 실루엣: 진행 방향으로 기수(원본은 위를 향하므로 +90°) */
      const[lo1,la1]=flight.interp(e),pp=project(la1,lo1);
      const[lo2,la2]=flight.interp(Math.min(1,e+.012)),p2=project(la2,lo2);
      if(pp){
        const ang=p2?Math.atan2(p2[1]-pp[1],p2[0]-pp[0]):0,sz=Math.max(15,width/40);
        ctx.save();ctx.translate(pp[0],pp[1]);ctx.rotate(ang+Math.PI/2);
        ctx.shadowColor='rgba(255,246,235,.65)';ctx.shadowBlur=Math.max(5,width/110);
        ctx.fillStyle='#fff6ec';
        try{
          if(!draw._jet)draw._jet=new Path2D('M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z');
          const k=sz/24;
          ctx.scale(k,k);ctx.translate(-12,-12);
          ctx.fill(draw._jet);
        }catch{
          ctx.beginPath();ctx.moveTo(0,-sz*.5);ctx.lineTo(sz*.4,sz*.45);ctx.lineTo(0,sz*.2);ctx.lineTo(-sz*.4,sz*.45);ctx.closePath();ctx.fill();
        }
        ctx.restore();
      }
    }
    if(current&&!flight){
      const pt=displayPoint(current),p=pt&&project(pt[0],pt[1]);
      if(p){
        const pulse=(8+Math.sin(Date.now()/230)*2)*(width/430);
        ctx.beginPath();ctx.arc(p[0],p[1],pulse*1.6,0,Math.PI*2);ctx.strokeStyle='rgba(90,255,170,.9)';ctx.lineWidth=Math.max(1,width/520);ctx.stroke();
        ctx.beginPath();ctx.arc(p[0],p[1],pulse*.7,0,Math.PI*2);ctx.fillStyle='#25ff86';ctx.fill();
      }
    }
  }
  ctx.restore();
  const rim=ctx.createRadialGradient(cx,cy,r*.78,cx,cy,r*1.08);
  rim.addColorStop(0,'rgba(0,0,0,0)');rim.addColorStop(.66,'rgba(0,0,0,0)');rim.addColorStop(1,'rgba(225,25,45,.46)');
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=rim;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.24)';ctx.lineWidth=Math.max(1,width/480);ctx.stroke();
}
function shortDelta(a,b){let d=b-a;while(d>180)d-=360;while(d<-180)d+=360;return d}
let rafId=null,lastFrame=0;
function loop(ts){
  rafId=requestAnimationFrame(loop);
  if(ts-lastFrame<33)return;               /* 30fps 상한 */
  lastFrame=ts;
  updateNight();
  if(flightStep(ts)){draw();return}
  if(targetRotation){
    rotation[0]+=shortDelta(rotation[0],targetRotation[0])*.09;
    rotation[1]+=(targetRotation[1]-rotation[1])*.09;
    if(Math.abs(shortDelta(rotation[0],targetRotation[0]))<.08&&Math.abs(rotation[1]-targetRotation[1])<.08)targetRotation=null;
  }else rotation[0]-=started?.032:.055;
  draw();
}
function startLoop(){if(!rafId){lastFrame=0;rafId=requestAnimationFrame(loop)}}
function stopLoop(){if(rafId){cancelAnimationFrame(rafId);rafId=null}}
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){stopLoop();return}
  startLoop();
  /* 복귀 점검: 재생 중이었는데 오디오가 죽어 있으면 복구 */
  if(current&&!userPaused&&player&&player.paused&&!switching)recover('visible');
});

/* ─────────────── 8.5 디버그 오버레이 (로고 5회 탭) ───────────────
   실기기에서 "안 돼요"를 "무엇이 왜 실패했는지"로 바꾸기 위한 창.

function renderDebug(){
  const a=player;
  const head=[
    'v78  unlocked='+unlocked+'  pool='+pool.size+'  played='+played.size+'  blacklist='+bad.size,
    'hls: native='+(nativeHls()?'yes':'no')+'  lib='+(hlsLib?'loaded':(window.Hls?'present':'-')),
    'health: '+healthSummary(),
    'mirror='+String(lastClickBase).replace('https://','')+'  sleep='+(sleepEnd?Math.round((sleepEnd-Date.now())/1000)+'s':'off')+'  reconnects='+reconnects,
    current?('now  : '+clean(current.name)+' ['+ccOf(current)+'] '+String(current.codec||'?')+' '+(current.bitrate||'?')+'k'):'now  : —',
    current?('url  : '+stream(current)):'',
    a?('audio: paused='+a.paused+'  t='+((a.currentTime||0).toFixed(1))+'s  vol='+(typeof a.volume==='number'?a.volume.toFixed(2):'?')):'audio: —'
  ].filter(Boolean).join('\n');
  $('debugBody').textContent=head+'\n────────────────────\n'+DLOG.slice().reverse().join('\n');

let brandTaps=0,brandTimer=null;
$('brand').onclick=()=>{
  brandTaps++;
  clearTimeout(brandTimer);
  brandTimer=setTimeout(()=>{brandTaps=0},3000);
  if(brandTaps>=5){
    brandTaps=0;debugOpen=true;
    $('debug').classList.add('open');
    renderDebug();
  }
};
$('closeDebug').onclick=()=>{debugOpen=false;$('debug').classList.remove('open')};
setInterval(()=>{if(debugOpen)renderDebug()},2000);
async function loadWorld(){
  if(!window.d3||!window.topojson)return;
  for(const u of WORLD_URLS){
    try{const data=await d3.json(u);land=topojson.feature(data,data.objects.land);draw();return}catch{}
  }
}
/* d3/topojson이 jsdelivr에서 실패했다면 unpkg에서 재시도 */
function ensureLibs(){
  const need=[];
  if(!window.d3)need.push('https://unpkg.com/d3@7/dist/d3.min.js');
  if(!window.topojson)need.push('https://unpkg.com/topojson-client@3/dist/topojson-client.min.js');
  if(!need.length)return;
  let left=need.length;
  for(const src of need){
    const s=document.createElement('script');
    s.src=src;
    s.onload=s.onerror=()=>{if(--left===0){resize();loadWorld().then(resize)}};
    document.head.appendChild(s);
  }
}
